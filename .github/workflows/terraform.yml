name: terraform infrastructure

permissions:  #for aws
  id-token: write
  contents: read

on:
  pull_request:
    branches:
      - main
    paths:
      - terraform/**
  push:
    branches:
     - main
    tags:
      - "v*"
    paths:
      - terraform/**

  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to perform
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
env:
  TF_VERSION: '1.7.0'
  AWS_REGION: eu-north-1
  WORKING_DIR: terraform/envs/dev

concurrency:
  group: production-deployments
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.NOVA_GITHUB_ACTIONS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
         terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      continue-on-error: true

    - name: Terraform Init
      run: |
              terraform init \
                -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
                -backend-config="key=novagram/production/terraform.tfstate" \
                -backend-config="region=${{ env.AWS_REGION }}"

    - name: terraform validate
      run: terraform validate

    - name: terraform plan
      run: terraform plan -out=tfplan -no-color
      continue-on-error: false

    - name: Upload plan as artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-${{ github.run_number }}
        path: ${{ env.WORKING_DIR }}/tfplan
        retention-days: 7

    - name: Terraform Apply
      if: |
        (github.ref == 'refs/heads/main' && 
        github.event_name == 'push' ) ||
        github.event.inputs.action == 'apply'
      run: terraform apply -auto-approve tfplan

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve


    
