name: novagram

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: davidchimere-test/novagram-backend

    expose:
      - "5000"

    env_file:
      - ./backend/.env.development

    environment:
      NODE_ENV: development

    restart: unless-stopped

    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend/chat-frontend
      dockerfile: Dockerfile
      args:
          NGINX_CONF: default.dev.conf

    image: davidchimere-test/novagram-frontend

    ports:
      - "80:80"

  redis:
    image: redis:7-alpine
    container_name: novagram-redis

    ports:
      - "6379:6379"